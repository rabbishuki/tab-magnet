<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Load Tab Magnet unpacked in Chrome</title>
  <desc id="desc">A simplified screenshot showing Chrome extensions developer mode and the Load unpacked button.</desc>
  <rect width="1200" height="720" fill="#f6f8fb"/>
  <rect x="80" y="70" width="1040" height="580" rx="24" fill="#fff" stroke="#d8dee8"/>
  <text x="130" y="145" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1f2430">Extensions</text>
  <rect x="860" y="112" width="190" height="42" rx="21" fill="#dbeafe"/>
  <circle cx="1028" cy="133" r="18" fill="#2563eb"/>
  <text x="695" y="141" font-family="Arial, sans-serif" font-size="22" fill="#334155">Developer mode</text>
  <rect x="130" y="205" width="210" height="54" rx="10" fill="#2563eb"/>
  <text x="168" y="239" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#fff">Load unpacked</text>
  <path d="M335 260 C450 330 520 360 650 360" stroke="#9333ea" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="650,360 622,344 625,378" fill="#9333ea"/>
  <rect x="650" y="285" width="350" height="170" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="680" y="320" width="78" height="78" rx="14" fill="#eef6ff" stroke="#1d75bd" stroke-width="8" transform="rotate(-12 719 359)"/>
  <path d="M830 405 a62 62 0 1 0 124 0 v-80 h-45 v80 a17 17 0 1 1 -34 0 v-80 h-45z" fill="#8b5cf6" stroke="#251238" stroke-width="12" transform="rotate(-20 892 380)"/>
  <text x="780" y="365" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2430">Select tab-magnet</text>
  <text x="780" y="402" font-family="Arial, sans-serif" font-size="20" fill="#64748b">from your downloaded release zip</text>
  <rect x="130" y="500" width="300" height="70" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="160" y="544" font-family="Arial, sans-serif" font-size="22" fill="#334155">Tab Magnet loaded</text>
