<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">Loading Tab Magnet from Chrome Extensions</title>
  <desc id="desc">A clean illustration of the Chrome Extensions page with Developer mode enabled, the Load unpacked button highlighted, and Tab Magnet installed.</desc>

  <rect width="1600" height="760" fill="#ffffff"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1600" height="78" fill="#ffffff"/>
  <line x1="0" y1="78" x2="1600" y2="78" stroke="#d7dce5"/>
  <circle cx="24" cy="26" r="11" fill="#ea4335"/>
  <circle cx="24" cy="26" r="6" fill="#fbbc04"/>
  <circle cx="24" cy="26" r="3" fill="#4285f4"/>
  <circle cx="24" cy="26" r="1.6" fill="#ffffff"/>
  <text x="48" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#202124">Extensions</text>

  <rect x="560" y="14" width="480" height="34" rx="17" fill="#eef1f7"/>
  <circle cx="584" cy="31" r="6" fill="none" stroke="#5f6368" stroke-width="2"/>
  <line x1="589" y1="36" x2="596" y2="43" stroke="#5f6368" stroke-width="2" stroke-linecap="round"/>
  <text x="606" y="36" font-family="Arial, sans-serif" font-size="14" fill="#5f6368">Search extensions</text>

  <text x="1474" y="33" font-family="Arial, sans-serif" font-size="14" fill="#202124">Developer mode</text>
  <rect x="1560" y="18" width="28" height="16" rx="8" fill="#3156d3"/>
  <circle cx="1580" cy="26" r="6" fill="#ffffff"/>

  <!-- Toolbar -->
  <rect x="0" y="79" width="1600" height="64" fill="#ffffff"/>
  <rect x="16" y="96" width="98" height="36" rx="18" fill="#ffffff" stroke="#2457ff" stroke-width="2.5"/>
  <text x="38" y="119" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2457ff">Load unpacked</text>
  <rect x="128" y="97" width="106" height="34" rx="17" fill="#ffffff" stroke="#8fb0ff"/>
  <text x="153" y="119" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2457ff">Pack extension</text>
  <rect x="248" y="97" width="66" height="34" rx="17" fill="#ffffff" stroke="#8fb0ff"/>
  <text x="272" y="119" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2457ff">Update</text>

  <!-- Left nav -->
  <rect x="0" y="144" width="176" height="616" fill="#ffffff"/>
  <rect x="0" y="160" width="176" height="42" rx="21" fill="#e8f0fe"/>
  <rect x="20" y="174" width="14" height="14" rx="3" fill="none" stroke="#2457ff" stroke-width="2"/>
  <text x="48" y="187" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#174ea6">My extensions</text>
  <rect x="20" y="220" width="14" height="10" rx="2" fill="none" stroke="#5f6368" stroke-width="2"/>
  <text x="48" y="230" font-family="Arial, sans-serif" font-size="14" fill="#202124">Keyboard shortcuts</text>
  <line x1="16" y1="268" x2="170" y2="268" stroke="#eef1f4"/>
  <text x="16" y="292" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">Developing extensions?</text>
  <text x="16" y="313" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">Stay up to date with</text>
  <text x="16" y="334" font-family="Arial, sans-serif" font-size="14" fill="#2457ff">Chrome Extension docs</text>

  <!-- Main content -->
  <text x="378" y="262" font-family="Arial, sans-serif" font-size="19" fill="#202124">All Extensions</text>

  <!-- Tab Magnet card -->
  <rect x="378" y="284" width="278" height="142" rx="7" fill="#ffffff" stroke="#d7dce5" filter="url(#shadow)"/>
  <image href="../icons/icon-48.png" x="398" y="305" width="42" height="42"/>
  <text x="456" y="318" font-family="Arial, sans-serif" font-size="15" fill="#202124">Tab Magnet</text>
  <text x="540" y="318" font-family="Arial, sans-serif" font-size="13" fill="#5f6368">0.1.0</text>
  <text x="456" y="343" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">Reuse open tabs instead of</text>
  <text x="456" y="364" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">opening duplicate links.</text>
  <rect x="396" y="389" width="56" height="30" rx="15" fill="#ffffff" stroke="#8fb0ff"/>
  <text x="412" y="409" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#2457ff">Details</text>
  <rect x="462" y="389" width="64" height="30" rx="15" fill="#ffffff" stroke="#8fb0ff"/>
  <text x="480" y="409" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#2457ff">Remove</text>
  <circle cx="607" cy="404" r="7" fill="none" stroke="#3c4043" stroke-width="2"/>
  <path d="M613 399 L613 392 L620 392" fill="none" stroke="#3c4043" stroke-width="2" stroke-linecap="round"/>
  <rect x="628" y="397" width="22" height="14" rx="7" fill="#3156d3"/>
  <circle cx="643" cy="404" r="5.5" fill="#ffffff"/>

  <!-- Other cards for context -->
  <rect x="668" y="284" width="278" height="142" rx="7" fill="#ffffff" stroke="#d7dce5" filter="url(#shadow)"/>
  <rect x="690" y="310" width="30" height="30" rx="5" fill="#e8f0fe"/>
  <rect x="705" y="302" width="22" height="26" rx="4" fill="#fbbc04"/>
  <rect x="697" y="314" width="22" height="26" rx="4" fill="#4285f4"/>
  <text x="744" y="318" font-family="Arial, sans-serif" font-size="15" fill="#202124">Google Docs Offline</text>
  <text x="744" y="343" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">Edit and view documents</text>
  <text x="744" y="364" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">without internet access.</text>
  <rect x="688" y="389" width="56" height="30" rx="15" fill="#ffffff" stroke="#8fb0ff"/>
  <text x="704" y="409" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#2457ff">Details</text>
  <rect x="754" y="389" width="64" height="30" rx="15" fill="#ffffff" stroke="#8fb0ff"/>
  <text x="772" y="409" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#2457ff">Remove</text>
  <rect x="918" y="397" width="22" height="14" rx="7" fill="#3156d3"/>
  <circle cx="933" cy="404" r="5.5" fill="#ffffff"/>

  <rect x="958" y="284" width="278" height="142" rx="7" fill="#ffffff" stroke="#d7dce5" filter="url(#shadow)"/>
  <circle cx="990" cy="326" r="18" fill="#f1f3f4"/>
  <text x="1016" y="318" font-family="Arial, sans-serif" font-size="15" fill="#202124">Another extension</text>
  <text x="1016" y="343" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">Shown for context only.</text>
  <rect x="978" y="389" width="56" height="30" rx="15" fill="#ffffff" stroke="#8fb0ff"/>
  <text x="994" y="409" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#2457ff">Details</text>
  <rect x="1208" y="397" width="22" height="14" rx="7" fill="#dadce0"/>
  <circle cx="1215" cy="404" r="5.5" fill="#ffffff"/>

  <!-- Callout arrow -->
  <path d="M144 112 C250 92 314 92 374 128" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
  <path d="M374 128 L351 128 L365 109" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="112" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#6d28d9">1. Click Load unpacked</text>
  <text x="390" y="462" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#6d28d9">2. Select the unzipped tab-magnet folder</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
</svg>
