<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tab Magnet</title>
    <link rel="stylesheet" href="confirm.css" />
  </head>
  <body>
    <main>
      <header>
        <img src="icons/icon-48.png" alt="" />
        <div>
          <h1>Similar tab already open</h1>
          <p>Choose how Tab Magnet should handle this link.</p>
        </div>
      </header>

      <section>
        <h2>New link</h2>
        <code id="new-url"></code>
      </section>

      <section>
        <h2>Open tab</h2>
        <code id="existing-url"></code>
      </section>

      <footer>
        <button id="keep">Open new</button>
        <button id="reuse">Update existing</button>
        <button id="switch" autofocus>Switch to existing</button>
      </footer>
    </main>

    <script src="confirm.js"></script>
  </body>
</html>
